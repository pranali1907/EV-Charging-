<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="ChargeLive admin login.">
        <title>Admin Login - ChargeLive</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
        <link href="{{ url_for('static', filename='css/admin.css') }}" rel="stylesheet">
    </head>
    <body class="admin-login-body">
        <main class="admin-login-shell">
            <section class="admin-login-panel">
                <div class="admin-login-brand">
                    <span><i class="bi bi-lightning-charge-fill"></i></span>
                    <div>
                        <strong>ChargeLive</strong>
                        <small>Admin Console</small>
                    </div>
                </div>

                <div class="admin-login-heading">
                    <h1>Admin Login</h1>
                    <p>Secure access for platform operations.</p>
                </div>

                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }} admin-alert" role="alert">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}

                <form method="post" novalidate>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input id="username" name="username" class="form-control" type="text" value="{{ username }}" autocomplete="username" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="password">Password</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                            <input id="password" name="password" class="form-control" type="password" autocomplete="current-password" required>
                            <button id="togglePassword" class="btn btn-outline-secondary" type="button" aria-label="Show password">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="admin-login-options">
                        <div class="form-check">
                            <input id="rememberMe" name="remember_me" class="form-check-input" type="checkbox">
                            <label class="form-check-label" for="rememberMe">Remember Me</label>
                        </div>
                    </div>

                    <button class="btn btn-primary btn-lg w-100 admin-login-button" type="submit">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Login
                    </button>
                </form>
            </section>
        </main>

        <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    </body>
</html>
